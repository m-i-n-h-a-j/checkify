<main class="h-[calc(100vh/1.3)] flex flex-col items-center justify-center">
  <div
    class="h-[338px] w-[830px] bg-[#f6f7f8] dark:bg-[#030508] opacity-80 px-[55px] py-[26px] drop-shadow-md"
  >
    <form [formGroup]="chequeForm" (ngSubmit)="onSubmit()">
      <div class="flex items-start justify-between">
        <span (click)="toggleDarkMode()" class="text-3xl font-bold">CHECKIFY</span>
        <app-date-input-component (dateChangeEvent)="setDate($event)" />
      </div>
      <input
        type="text"
        class="border-b w-full mt-1.5 outline-none font-semibold placeholder:text-sm placeholder:font-normal uppercase focus:border-indigo-500"
        placeholder="PAY"
        formControlName="name"
      />

      <div class="mt-2 flex flex-row items-end h-[71px] justify-between">
        <div class="w-[70%]">
          <input
            #amountInWordsPrimary
            type="text"
            class="border-b w-full mt-1 outline-none text-sm placeholder:text-sm focus:border-indigo-500 pointer-events-none"
            placeholder="SUM OF"
            type="text"
            formControlName="amountInWordsPrimary"
          />
          <input
            #amountInWordsSecondary
            type="text"
            class="border-b w-full mt-4 outline-none text-sm focus:border-indigo-500 pointer-events-none"
            formControlName="amountInWordsSecondary"
          />
        </div>
        <div class="w-[28%]">
          <input
            type="text"
            class="border w-[20%] h-[42px] mt-1 outline-none text-center text-lg font-extrabold placeholder:text-2xl"
            placeholder="₹"
            disabled
          />

          <input
            #Amount
            type="text"
            formControlName="amount"
            class="border w-[80%] h-[42px] mt-1 outline-none pl-1.5 text-lg font-extrabold focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500"
          />
        </div>
      </div>
      <div class="flex flex-row items-end justify-between mt-6 h-[75px]">
        <div class="w-[52%] mb-auto">
          <input
            type="text"
            class="border w-[18%] h-9 outline-none placeholder:text-sm placeholder:text-center"
            placeholder="Acc No"
            disabled
          />
          <input type="text" class="border w-[82%] h-9 outline-none" disabled />
        </div>

        <div class="w-[26%] flex flex-col items-center justify-end">
          <input type="text" class="border-b w-full mt-1 outline-none" disabled />
          <span class="text-sm flex items-center justify-center mt-2">Please Sign Above</span>
        </div>
      </div>

      <div class="flex items-center justify-center w-full mt-2">
        <img src="misc.avif" alt="" class="w-[65%] rounded-full dark:invert" />
      </div>
    </form>
  </div>

  <button
    (click)="showPrintSection()"
    (click)="scrollToSection('print')"
    type="submit"
    class="bg-indigo-600 px-2 py-1 rounded-lg text-white mt-4 hover:bg-indigo-700 cursor-pointer"
  >
    Next
  </button>
</main>

<div [hidden]="!this.isPrintSectionVisible()" class="w-full px-4">
  <section id="print" class="bg-indigo-100 dark:bg-indigo-950 rounded-2xl w-full py-4 px-6 mb-8">
    <div
      [hidden]="!this.showSelectPresets()"
      class="flex flex-row gap-1 items-center justify-start"
    >
      <label for="fruit" class="text-sm font-medium">Choose a layout:</label>
      <select
        (change)="this.coreService.setPreset($event)"
        [(ngModel)]="selectedPresetId"
        id="presetSelect"
        id="fruit"
        class="border rounded-md px-3 py-2 focus:outline-none focus:ring focus:ring-indigo-500 focus:border-indigo-500 w-fit"
      >
        @for (preset of this.coreService.chequePresets(); track preset.id) {
        <option
          class="bg-gray-50 dark:bg-gray-950 flex items-center justify-center"
          value="{{ preset.id }}"
        >
          {{ preset.presetName }}
        </option>
        }
      </select>
    </div>

    <app-print-component
      [date]="date()"
      [name]="this.chequeForm.value.name ?? ''"
      [amount]="this.chequeForm.value.amount ?? ''"
      [amntInWordsLine1]="this.chequeForm.value.amountInWordsPrimary ?? ''"
      [amntInWordsLine2]="this.chequeForm.value.amountInWordsSecondary ?? ''"
    />
  </section>
</div>
